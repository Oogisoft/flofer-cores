      <stop offset="0" stop-color="#2b3138"/>
      <stop offset="0.55" stop-color="#173a5a"/>
      <stop offset="1" stop-color="#1c2127"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
